# Fail2ban jail for Remnawave Admin panel
# Place in /etc/fail2ban/jail.d/remnawave-admin.conf
#
# Requires the log file to be accessible from the host.
# Mount the container log directory, e.g.:
#   volumes:
#     - ./logs:/app/logs

[remnawave-admin]
enabled  = true
filter   = remnawave-admin
logpath  = /path/to/remnawave-admin/logs/auth_failures.log
maxretry = 5
findtime = 600
bantime  = 3600
action   = iptables-multiport[name=remnawave, port="80,443"]
